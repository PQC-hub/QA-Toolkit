<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="QA Toolkit - Công cụ tối ưu hóa và kiểm tra hệ thống Windows viết bằng PowerShell với giao diện GUI thân thiện.">
    <title>QA Toolkit</title>
    
    <!-- FAVICON CHUẨN NHẤT (đã fix hết lỗi local) -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <style>
        body { font-family: Segoe UI, Arial, sans-serif; background: #0d1117; color: white; margin: 0; line-height: 1.6; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 60px; background: #161b22; position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; font-weight: 700; font-size: 22px; }
        .logo img { width: 36px; margin-right: 12px; }
        .menu a { color: white; text-decoration: none; margin-left: 30px; opacity: 0.85; font-size: 16px; transition: 0.3s; }
        .menu a:hover { opacity: 1; color: #58a6ff; }
        .banner { max-width: 980px; margin: 40px auto 20px; padding: 0 4%; }
        .banner img { width: 100%; display: block; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
        .hero { text-align: center; padding: 60px 20px 80px; }
        .hero h1 { font-size: 56px; margin-bottom: 12px; }
        .subtitle { font-size: 20px; opacity: 0.8; max-width: 700px; margin: 0 auto; }
        .download { display: inline-block; margin-top: 40px; background: #2ea043; padding: 18px 52px; font-size: 23px; border-radius: 12px; color: white; text-decoration: none; font-weight: 600; transition: 0.3s; box-shadow: 0 8px 20px rgba(46,160,67,0.3); }
        .download:hover { background: #3fb950; transform: translateY(-4px); }
        .mainshot img, .grid img { width: 100%; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
        .features, .gallery, .guide { max-width: 1180px; margin: 100px auto; padding: 0 20px; }
        .card { background: #161b22; padding: 34px 24px; border-radius: 16px; text-align: center; transition: 0.4s; }
        .card:hover { transform: translateY(-12px); }
        .card span { font-size: 48px; display: block; margin-bottom: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
        footer { text-align: center; padding: 40px; opacity: 0.65; font-size: 15px; }
        @media (max-width: 768px) { .navbar { padding: 18px 20px; } .hero h1 { font-size: 42px; } }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <img src="favicon.ico" alt="Logo">
        QA Toolkit
    </div>
    <div class="menu">
        <a href="#features">Tính năng</a>
        <a href="#gallery">Hình ảnh</a>
        <a href="#guide">Hướng dẫn</a>
        <a href="https://github.com/PQC-hub/QA-Toolkit" target="_blank">GitHub</a>
    </div>
</div>

<div class="banner">
    <img src="banner.png" alt="QA Toolkit Banner">
</div>

<!-- Phần hero, mainshot, features, gallery, guide, footer giữ nguyên như code cũ của anh -->

<div class="hero">
    <h1>QA Toolkit</h1>
    <div class="subtitle">Công cụ tối ưu hóa và kiểm tra hệ thống Windows<br>được viết bằng PowerShell • Giao diện GUI thân thiện</div>
    <a class="download" href="https://github.com/PQC-hub/QA-Toolkit/releases" target="_blank">Tải phiên bản mới nhất</a>
</div>

<div class="mainshot">
    <img src="manhinh1.png" alt="Giao diện QA Toolkit">
</div>

<!-- (các phần features, gallery, guide, footer anh copy từ code cũ là xong) -->

</body>
</html>
